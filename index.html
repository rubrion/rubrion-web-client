<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo_rubrion_ver4.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#C8303F" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="apple-touch-icon" href="/logo_rubrion_ver4.png" />

  <!-- Resource hints — Fira Code is the brand font; preconnect cuts ~150ms off first paint -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" />

  <!-- Cloudflare Turnstile (loaded async; guards the contact form) -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <title>Rubrion - Code-free, cloud-fee</title>
  <meta name="description" content="White-label SaaS modules with transparent infrastructure costs. No vendor lock-in, no hidden fees, just value in the service." />
</head>

<body>
  <div id="root"></div>
  <script>
    // Clear any existing Service Worker cache
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // Clear all caches
    if ('caches' in window) {
      caches.keys().then(function (names) {
        for (let name of names) {
          caches.delete(name);
        }
      });
    }
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
