<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo_rubrion_ver4.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="apple-touch-icon" href="/logo_rubrion_ver4.png" />
  <title>Rubrion - Code-free, cloud-fee</title>
  <meta name="description" content="White-label SaaS modules with transparent infrastructure costs. No vendor lock-in, no hidden fees, just value in the service." />
</head>

<body>
  <div id="root"></div>
  <script>
    // Clear any existing Service Worker cache
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // Clear all caches
    if ('caches' in window) {
      caches.keys().then(function (names) {
        for (let name of names) {
          caches.delete(name);
        }
      });
    }
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
